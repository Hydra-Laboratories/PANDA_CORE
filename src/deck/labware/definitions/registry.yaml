# Labware definition registry: maps each definition name to the Labware
# subclass that implements it and the YAML config file that supplies the
# class attributes (everything except `location`, which is set per-instance
# in a deck YAML).
#
# Ursa (PANDA-BEAR) labware lives under the `ursa_` prefix so it can
# coexist with other vendors (e.g. opentrons, sbs) added later.

labware:
  ursa_vial_holder:
    module: deck.labware.vial_holder
    class_name: VialHolder
    config: ursa_vial_holder/9VialHolder.yaml

  ursa_tip_rack:
    module: deck.labware.tip_rack
    class_name: TipRack
    config: ursa_tip_rack/TipRack.yaml

  ursa_wellplate_holder:
    module: deck.labware.well_plate_holder
    class_name: WellPlateHolder
    config: ursa_wellplate_holder/WellplateHolder.yaml

  ursa_wellplate_holder_conductive:
    module: deck.labware.well_plate_holder
    class_name: WellPlateHolder
    config: ursa_wellplate_holder_conductive/WellplateHolder.yaml
