# Candidate Filmetrics gantry configuration for the deck-origin refactor.
#
# This translates configs/gantry/cub_filmetrics.yaml into the CubOS deck frame:
# front-left-bottom origin, +X right, +Y back, +Z up, -Z down.
# Confirm live GRBL settings, homing corner, jog directions, and usable Z travel
# before running on hardware.

serial_port: /dev/ttyUSB0

cnc:
  homing_strategy: standard
  total_z_height: 90.0
  y_axis_motion: head
  # Absolute deck-frame Z clearance plane for home/park/edge-risk moves.
  structure_clearance_z: 80.0

working_volume:
  x_min: 0.0
  x_max: 280.0
  y_min: 0.0
  y_max: 175.0
  z_min: 0.0
  z_max: 90.0

grbl_settings:
  # Copied from the legacy Filmetrics config as a starting point. Re-verify
  # these on the controller before trusting physical motion.
  dir_invert_mask: 2
  status_report: 0
  hard_limits: true
  homing_enable: true
  homing_dir_mask: 0
  homing_pull_off: 2.0
  steps_per_mm_x: 800.0
  steps_per_mm_y: 800.0
  steps_per_mm_z: 800.0
  max_rate_x: 2000.0
  max_rate_y: 2000.0
  max_rate_z: 2000.0
  accel_x: 50.0
  accel_y: 50.0
  accel_z: 50.0
  max_travel_x: 300.0
  max_travel_y: 200.0
  max_travel_z: 80.0
