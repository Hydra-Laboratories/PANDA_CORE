# Candidate PANDA gantry configuration for the deck-origin refactor.
#
# This is NOT a drop-in replacement for configs/gantry/*.yaml until staged
# hardware validation passes. It encodes the CubOS deck frame:
# front-left-bottom origin, +X right, +Y back, +Z up, -Z down.
#
# Estimated work volume from the Cub XL / Genmitsu PROVerXL 4030 V2 setup.
# Confirm live $130/$131/$132 and jog directions before using on hardware.

serial_port: /dev/ttyUSB0

cnc:
  homing_strategy: standard
  total_z_height: 100.0
  y_axis_motion: head
  # Absolute deck-frame Z clearance plane for home/park/edge-risk moves.
  structure_clearance_z: 85.0

working_volume:
  x_min: 0.0
  x_max: 400.0
  y_min: 0.0
  y_max: 300.0
  z_min: 0.0
  z_max: 100.0

grbl_settings:
  # Starting point copied from the current Cub XL ASMI config. Re-verify on
  # the actual PANDA controller before trusting any physical move.
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 300.0
  max_travel_z: 100.0
