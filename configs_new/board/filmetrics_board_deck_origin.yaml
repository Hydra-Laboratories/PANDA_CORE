# Candidate Filmetrics board config for the deck-origin refactor.
#
# These are placeholder/default TCP values. The optical head offset, depth, and
# measurement plane should be recalibrated on the physical setup.

instruments:
  filmetrics:
    type: filmetrics
    vendor: kla
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    # The legacy mock Filmetrics board used measurement/safe height 10.0 in the
    # old positive-down 90 mm frame, so this placeholder preserves that as
    # 90 - 10 = 80 mm in deck-origin +Z-up coordinates.
    measurement_height: 80.0
    safe_approach_height: 80.0
    exe_path: ""
    recipe_name: ""
