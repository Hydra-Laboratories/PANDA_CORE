# Panda deck configuration.
# Tip coordinates are preserved exactly from `panda.json`.
# Nested holder children omit z; their experiment z is derived from the holder seat height.

labware:
  tip_rack_a:
    load_name: ursa_tip_rack
    # ursa_tip_rack's default calibration is already anchored at
    # (111.9, 2.7) — nothing to override for this rack.

  tip_rack_b:
    load_name: ursa_tip_rack
    # Second tip rack sits 127 mm further along x; re-anchor calibration.
    calibration:
      a1: { x: 238.9, y: 2.7 }
      a2: { x: 247.4, y: 2.7 }

  well_plate_holder:
    type: well_plate_holder
    name: panda_well_plate_holder
    # Reference point currently aligned to the contained plate A1 XY.
    location:
      x: 221.75
      y: 78.5
      z: 183.0
    well_plate:
      model_name: panda_96_wellplate
      rows: 8
      columns: 12
      calibration:
        a1:
          x: 221.75
          y: 78.5
        a2:
          x: 230.75
          y: 78.5
      x_offset_mm: 9.0
      y_offset_mm: 9.0

  vial_holder:
    type: vial_holder
    name: panda_vial_holder
    # Reference point currently aligned to the longitudinal center of the holder.
    location:
      x: 17.1
      y: 132.9
      z: 164.0
