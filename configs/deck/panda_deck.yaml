# Panda deck configuration.
#
# Each vial / well plate is defined once at the top level with an explicit z.
# Holders reference their contained labware by name. The deck loader enforces
# that each referenced vial/plate's location.z equals
# holder.location.z + labware_seat_height_from_bottom_mm.

labware:
  tip_rack_a:
    load_name: ursa_tip_rack
    # Uses ursa_tip_rack's default calibration.

  tip_rack_b:
    load_name: ursa_tip_rack
    # Second tip rack sits one column further along x; re-anchor calibration.
    calibration:
      a1: { x: 238.9, y: 2.7 }
      a2: { x: 247.4, y: 2.7 }

  panda_plate:
    type: well_plate
    name: panda_plate
    model_name: panda_96_wellplate
    rows: 8
    columns: 12
    height_mm: 14.35
    calibration:
      a1: { x: 221.75, y: 78.5, z: 188.0 }
      a2: { x: 230.75, y: 78.5, z: 188.0 }
    x_offset_mm: 9.0
    y_offset_mm: 9.0

  well_plate_holder:
    type: well_plate_holder
    name: panda_well_plate_holder
    location: { x: 221.75, y: 78.5, z: 183.0 }
    well_plate: panda_plate

  vial_1:
    type: vial
    name: vial_1
    model_name: 20ml_vial
    height_mm: 57.0
    diameter_mm: 28.0
    location: { x: 17.1, y: 0.9, z: 182.0 }
    capacity_ul: 20000.0
    working_volume_ul: 20000.0

