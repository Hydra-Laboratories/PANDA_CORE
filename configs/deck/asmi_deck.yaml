# LEGACY ASMI deck configuration — 96-well plate for indentation.
#
# Retained as the pre-issue-87 positive-down/top-reference ASMI calibration.
# It is not a post-cutover runnable deck-origin config. Use
# configs_new/deck/asmi_deck_origin.yaml with the matching configs_new files.
#
# Columns (1-12) increase in X, rows (A-H) decrease in Y.
# A2 = A1 + one column step in X to establish axis mapping.

labware:
  plate:
    load_name: sbs_96_wellplate
    name: asmi_96_well
    model_name: asmi_96_well
    calibration:
      a1:
        x: -51.25
        y: -238.25
        z: 73.0 # legacy positive-down well-top Z
      a2:
        x: -60.25
        y: -238.25
        z: 73.0 # legacy positive-down well-top Z
    # Override: ASMI deck orientation walks columns in -x direction.
    x_offset_mm: -9.0
    # y_offset_mm inherits the 9.0 default from sbs_96_wellplate.
