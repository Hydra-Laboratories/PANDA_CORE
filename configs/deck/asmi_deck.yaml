# ASMI deck configuration — 96-well plate for indentation.
# Columns (1-12) increase in X, rows (A-H) decrease in Y.
# A2 = A1 + one column step in X to establish axis mapping.

labware:
  plate:
    load_name: sbs_96_wellplate
    name: asmi_96_well
    model_name: asmi_96_well
    calibration:
      a1:
        x: 49.7
        y: 236.8
        z: 50.0 # well-top Z (positive-down: 50 mm below home)
      a2:
        x: 58.7
        y: 236.8
        z: 50.0 # well-top Z (positive-down: 50 mm below home)
    # Override: ASMI deck orientation walks columns in -x direction.
    x_offset_mm: 9.0
    # y_offset_mm inherits the 9.0 default from sbs_96_wellplate.
