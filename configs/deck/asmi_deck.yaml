# Candidate ASMI deck for the deck-origin refactor.
#
# Estimated from photos plus the current ASMI calibration converted from the
# old top/back/right positive-down frame into a 400 x 300 x 100 mm deck-origin
# volume:
#
#   old A1 = (-51.25, -238.25, 73.0)
#   new A1 = (400 - 51.25, 300 - 238.25, 100 - 73.0)
#          = (348.75, 61.75, 27.0)
#
# Current physical calibration:
# - A1 is the first well reference.
# - A2 shares X with A1 and is one column step higher in Y.
# - Rows advance toward lower X.

labware:
  plate:
    load_name: sbs_96_wellplate
    name: asmi_96_well_deck_origin_candidate
    model_name: asmi_96_well_deck_origin_candidate
    calibration:
      a1:
        x: 347
        y: 42
        z: 30.0 #actual 25
      a2:
        x: 338
        y: 42.0
        z: 30.0
    x_offset_mm: -9.0
    y_offset_mm: 9.0
