# Filmetrics deck layout for the CubOS deck-origin frame.
#
# Translated from configs/deck/filmetrics_deck.yaml and
# configs/gantry/cub_filmetrics.yaml:
#
#   old A1 = (-10.0, -35.0, 20.0)
#   new A1 = (280 - 10.0, 175 - 35.0, 90 - 20.0)
#          = (270.0, 140.0, 70.0)
#
# The translated deck-origin layout keeps columns moving toward lower
# deck-frame Y.

labware:
  plate_1:
    load_name: sbs_96_wellplate
    name: filmetrics_96_well_deck_origin
    model_name: opentrons_96_well_20ml
    calibration:
      a1:
        x: 270.0
        y: 140.0
        z: 70.0
      a2:
        x: 270.0
        y: 131.0
        z: 70.0
    x_offset: 9.0
    y_offset: 9.0
