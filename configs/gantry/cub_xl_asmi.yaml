# ASMI gantry configuration measured on 2026-04-24 for the deck-origin frame.
#
# It encodes the CubOS deck frame:
# front-left-bottom origin, +X right, +Y back, +Z up, -Z down.
#
# Working bounds are aligned with the Sterling Cub XL gantry config.

serial_port: /dev/ttyUSB0

cnc:
  homing_strategy: standard
  total_z_height: 139.0
  y_axis_motion: head
  calibration_homing:
    runtime_brt:
      dir_invert_mask: 1
      homing_dir_mask: 0
    origin_flb:
      dir_invert_mask: 1
      homing_dir_mask: 7
  # Absolute deck-frame Z clearance plane for home/park/edge-risk moves.
  structure_clearance_z: 85.0

working_volume:
  x_min: 0.0
  x_max: 395.0
  y_min: 0.0
  y_max: 295.0
  z_min: 0.0
  z_max: 110.0

grbl_settings:
  # Controller settings for the Cub XL ASMI deck-origin workcell. Re-verify
  # live settings and recalibrate soft limits before trusting physical motion.
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 300.0
  max_travel_z: 100.0

instruments:
  asmi:
    type: asmi
    vendor: vernier
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    # Deck-origin convention: measurement_height and safe_approach_height are
    # absolute deck-frame Z planes, not labware-relative offsets. The estimated
    # plate/well top is z=27.0, so measurement_height=26.0 starts 1 mm below it.
    measurement_height: 26.0
    safe_approach_height: 35.0
    # Sensor hardware.
    force_threshold: -50
    sensor_channels: [1]
