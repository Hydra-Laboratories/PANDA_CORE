# ASMI gantry configuration.
# Genmitsu 3018 PRO with ASMI indenter mounted.
# After homing + G92 zero, coordinates increase positively from home.

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: standard
  total_z_height: 100.0
  y_axis_motion: head

working_volume:
  x_min: -390 #0.01 # 0.01 avoids "not set" warning; home WPos ≈ (0, 0)
  x_max: -0.01 # 390.0  
  y_min: -290 # 0.01
  y_max: -0.01 #290.0
  z_min: 0.0
  z_max: 95.0

grbl_settings:
  dir_invert_mask: 1
  homing_enable: true
  homing_dir_mask: 0 
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 300.0
  max_travel_z: 100.0

# Mounted instruments for the ASMI indenter setup.
instruments:
  asmi:
    type: asmi
    vendor: vernier
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    measurement_height: 0.0
    force_threshold: -50
    sensor_channels: [1]
