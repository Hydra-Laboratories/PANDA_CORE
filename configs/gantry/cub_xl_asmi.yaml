# ASMI gantry configuration measured on 2026-04-24 for the deck-origin refactor.
#
# This is NOT a drop-in replacement for configs/gantry/cub_xl_asmi.yaml until
# staged hardware validation passes. It encodes the CubOS deck frame:
# front-left-bottom origin, +X right, +Y back, +Z up, -Z down.
#
# Measured with the deck-origin calibration flow:
# - XY origin set at the front-left lower-reach point.
# - Z grounded at true bottom contact.
# - Homed WPos measured as X=399.000, Y=280.000, Z=87.000.

serial_port: /dev/ttyUSB0

cnc:
  homing_strategy: standard
  total_z_height: 87.0
  y_axis_motion: head
  # Absolute deck-frame Z clearance plane for home/park/edge-risk moves.
  structure_clearance_z: 85.0

working_volume:
  x_min: 0.0
  x_max: 399.0
  y_min: 0.0
  y_max: 280.0
  z_min: 0.0
  z_max: 87.0
