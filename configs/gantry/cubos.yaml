# CubOS — Genmitsu 3018 PROVer V2 (standard gantry)
# Positive-space XY after xy_hard_limits homing. Z is negative (down from home).

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: xy_hard_limits
  total_z_height: 90.0

working_volume:
  x_min: 0.0
  x_max: 300.0
  y_min: 0.0
  y_max: 200.0
  z_min: 0.0
  z_max: 80.0
