serial_port: /dev/ttyUSB0

cnc:
  homing_strategy: standard
  total_z_height: 139.0
  y_axis_motion: head
  # Absolute deck-frame Z clearance plane for home/park/edge-risk moves.
  structure_clearance_z: 85.0

working_volume:
  x_min: 0.0
  x_max: 306.0
  y_min: 0.0
  y_max: 300.0
  # ASMI TCP lower reach from ruler-gap calibration: 24 mm above deck bottom.
  z_min: 24.0
  z_max: 139.0

grbl_settings:
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 306.0
  max_travel_y: 300.0
  max_travel_z: 115.0
  soft_limits: false

instruments:
  asmi:
    type: asmi
    vendor: vernier
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    measurement_height: 2.0
    safe_approach_height: 5.0
    force_threshold: -50
    sensor_channels:
      - 1
