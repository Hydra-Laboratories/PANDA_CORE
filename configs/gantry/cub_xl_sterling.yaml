serial_port: /dev/ttyUSB0

cnc:
  homing_strategy: standard
  total_z_height: 139.0
  y_axis_motion: head
  # Absolute deck-frame Z used for inter-labware travel and the entry
  # approach to the first well of a scan.
  safe_z: 85.0

working_volume:
  x_min: 0.0
  x_max: 306.0
  y_min: 0.0
  y_max: 300.0
  # ASMI TCP lower reach from ruler-gap calibration: 24 mm above deck bottom.
  z_min: 24.0
  z_max: 139.0

machine_structures:
  # Fixed right X-max rail guard in deck-frame coordinates. This is machine
  # structure, not deck labware, and may sit outside normal working_volume.
  right_x_max_rail:
    type: box
    x_min: 480.0
    x_max: 540.0
    y_min: 0.0
    y_max: 300.0
    z_min: 0.0
    z_max: 100.0

grbl_settings:
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 306.0
  max_travel_y: 300.0
  max_travel_z: 115.0
  soft_limits: true

instruments:
  asmi:
    type: asmi
    vendor: vernier
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    # Labware-relative motion heights live on the protocol scan/measure command.
    force_threshold: -50
    sensor_channels:
      - 1
