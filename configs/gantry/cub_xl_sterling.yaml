serial_port: /dev/ttyUSB0
gantry_type: cub_xl
cnc:
  homing_strategy: standard
  total_z_height: 129.0
  y_axis_motion: head
  # Absolute deck-frame Z used for inter-labware travel and the entry
  # approach to the first well of a scan.
  safe_z: 85.0

working_volume:
  x_min: 0.0
  x_max: 307.0
  y_min: 0.0
  y_max: 300.0
  z_min: 0.0
  z_max: 129.0
grbl_settings:
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 307.0
  max_travel_y: 300.0
  max_travel_z: 129.0
  soft_limits: true
instruments:
  potentiostat:
    type: potentiostat
    vendor: admiral
    port: ''
    channel: 0
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: -10.0
  pipette:
    type: pipette
    vendor: opentrons
    pipette_model: p300_single_gen2
    port: ''
    baud_rate: 115200
    offline: true
    offset_x: 180.0
    offset_y: -25.0
    depth: 0.0
    # Labware-relative motion heights live on the protocol scan/measure command.
    force_threshold: -50
    sensor_channels:
      - 1
