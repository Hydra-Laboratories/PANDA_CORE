# CubOS-XL — Genmitsu 3018 PRO (large gantry)
# Positive-space XY after xy_hard_limits homing. Z positive (down from home).

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: standard
  total_z_height: 100.0
  y_axis_motion: head

working_volume:
  x_min: 0.01
  x_max: 400.0
  y_min: 0.01
  y_max: 300.0
  z_min: 0.0
  z_max: 100.0

grbl_settings:
  dir_invert_mask: null  # $3; fill in after controller normalization
  homing_enable: true
  homing_dir_mask: null  # $23; fill in after controller normalization
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 300.0
  max_travel_z: 100.0

# Mounted instruments for offline Cub-XL UV-Vis protocol checks.
instruments:
  uvvis:
    type: uvvis_ccs
    offline: true
    vendor: thorlabs
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    safe_approach_height: 10.0
    measurement_height: 3.0
