# ASMI gantry configuration.
# Genmitsu 3018 PRO with ASMI indenter mounted.
# After homing + G92 zero, all coordinates are negative from home.

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: standard

working_volume:
  x_min: -400.0
  x_max: 0.01   # 0.01 avoids "not set" warning; home WPos ≈ (0, 0)
  y_min: -300.0
  y_max: 0.01
  z_min: -80.0
  z_max: 0.0

grbl_settings:
  homing_enable: true
  steps_per_mm_x: 800.0
  steps_per_mm_y: 800.0
  steps_per_mm_z: 800.0
  max_travel_x: 300.0
  max_travel_y: 200.0
  max_travel_z: 80.0
