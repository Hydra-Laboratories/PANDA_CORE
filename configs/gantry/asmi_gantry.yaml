# ASMI gantry configuration.
# Genmitsu 3018 PRO with ASMI indenter mounted.
# After homing + G92 zero, coordinates increase positively from home.

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: standard
  total_z_height: 90.0
  y_axis_motion: head

working_volume:
  x_min: 400.0
  x_max: 0.01   # 0.01 avoids "not set" warning; home WPos ≈ (0, 0)
  y_min: 300.0
  y_max: 0.01
  z_min: 100.0
  z_max: 0.0

grbl_settings:
  homing_enable: true
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 300.0
  max_travel_y: 200.0
  max_travel_z: 100.0
