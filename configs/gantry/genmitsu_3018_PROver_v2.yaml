# Cub-XL — Genmitsu 3018 PROver v2 (larger gantry)
# WPos coordinates — all positive after homing. Home = (x_max, y_max, z_max).
serial_port: /dev/cu.usbserial-140
cnc:
  homing_strategy: xy_hard_limits

working_volume:
  x_min: 0.0
  x_max: 300.0
  y_min: 0.0
  y_max: 200.0
  z_min: 0.0
  z_max: 80.0

grbl_settings:
  dir_invert_mask: 2         # $3  — Y-axis direction inverted
  status_report: 0           # $10 — WPos reporting mode
  hard_limits: true          # $21
  homing_enable: true        # $22
  homing_dir_mask: 3         # $23 — X+Y homing positive direction
  homing_pull_off: 2.0       # $27 — mm
  steps_per_mm_x: 800.0      # $100
  steps_per_mm_y: 800.0      # $101
  steps_per_mm_z: 800.0      # $102
  max_travel_x: 300.0        # $130
  max_travel_y: 200.0        # $131
  max_travel_z: 80.0         # $132
