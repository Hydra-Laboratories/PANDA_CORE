# FIRST-TIME CALIBRATION SEED for Cub XL PANDA multi-instrument setup.
# Instrument offsets/depths are placeholders; run setup/calibrate_gantry.py
# and write the calibrated output to configs/gantry/cub_xl_panda.yaml.

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: standard
  total_z_height: 100.0
  y_axis_motion: head
  safe_z: 85.0
working_volume:
  x_min: 0.0
  x_max: 400.0
  y_min: 0.0
  y_max: 300.0
  z_min: 0.0
  z_max: 100.0
grbl_settings:
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 300.0
  max_travel_z: 100.0
instruments:
  potentiostat:
    type: potentiostat
    vendor: admiral
    port: ''
    channel: 0
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    layout_note: Left red probe; approximate offset from center camera mount.
  camera:
    type: placeholder_camera
    vendor: placeholder
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    placeholder_driver_required: true
    layout_note: Center mount; estimated imaging standoff above deck targets.
  vial_capper_decapper:
    type: placeholder_vial_capper_decapper
    vendor: placeholder
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    placeholder_driver_required: true
    layout_note: Right white tool; approximate capper/decapper centerline.
