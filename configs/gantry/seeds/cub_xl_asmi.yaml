# FIRST-TIME CALIBRATION SEED for Cub XL ASMI.
# Instrument offsets/depths are placeholders; run setup/calibrate_multi_instrument_board.py
# and write the calibrated output to configs/gantry/cub_xl_asmi.yaml.

serial_port: /dev/ttyUSB0
cnc:
  homing_strategy: standard
  total_z_height: 87.0
  y_axis_motion: head
  structure_clearance_z: 85.0
working_volume:
  x_min: 0.0
  x_max: 399.0
  y_min: 0.0
  y_max: 280.0
  z_min: 0.0
  z_max: 87.0
grbl_settings:
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 300.0
  max_travel_z: 100.0
instruments:
  asmi:
    type: asmi
    vendor: vernier
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    measurement_height: 26.0
    safe_approach_height: 35.0
    force_threshold: -50
    sensor_channels:
    - 1
