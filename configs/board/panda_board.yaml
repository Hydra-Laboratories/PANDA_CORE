# PANDA moving-instrument board for the CubOS deck-origin frame.
#
# Estimated from panda-board.jpg. This file intentionally captures placeholder
# instruments that do not exist in the registry yet:
#   - camera
#   - vial_capper_decapper
#
# The current board loader will reject those placeholder types until real
# drivers are implemented and added to src/instruments/registry.yaml.
#
# Estimated board-level structure clearance from the photos: 85.0 mm. That is
# intentionally not encoded per instrument here; it should become a
# board/motion safety envelope or gantry clearance field when the schema grows
# one.

grbl_settings:
  # Starting point copied from the Cub XL ASMI controller config. Re-verify on
  # the actual PANDA controller before trusting physical motion.
  dir_invert_mask: 1
  status_report: 0
  homing_enable: true
  homing_dir_mask: 0
  steps_per_mm_x: 400.0
  steps_per_mm_y: 400.0
  steps_per_mm_z: 400.0
  max_travel_x: 400.0
  max_travel_y: 300.0
  max_travel_z: 100.0

instruments:
  potentiostat:
    type: potentiostat
    vendor: admiral
    port: ""
    channel: 0
    offline: true
    offset_x: -55.0
    offset_y: 0.0
    depth: 58.0
    layout_note: Left red probe; approximate offset from center camera mount.

  camera:
    type: placeholder_camera
    vendor: placeholder
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 32.0
    placeholder_driver_required: true
    layout_note: Center mount; estimated imaging standoff above deck targets.

  vial_capper_decapper:
    type: placeholder_vial_capper_decapper
    vendor: placeholder
    offline: true
    offset_x: 58.0
    offset_y: 0.0
    depth: 48.0
    placeholder_driver_required: true
    layout_note: Right white tool; approximate capper/decapper centerline.
