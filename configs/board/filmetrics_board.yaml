# Filmetrics board config for the CubOS deck-origin frame.
#
# These are placeholder/default TCP values. The optical head offset, depth, and
# measurement plane should be recalibrated on the physical setup.

grbl_settings:
  # Copied from the legacy Filmetrics controller config as a starting point.
  # Re-verify live settings before trusting physical motion.
  dir_invert_mask: 2
  status_report: 0
  hard_limits: true
  homing_enable: true
  homing_dir_mask: 0
  homing_pull_off: 2.0
  steps_per_mm_x: 800.0
  steps_per_mm_y: 800.0
  steps_per_mm_z: 800.0
  max_rate_x: 2000.0
  max_rate_y: 2000.0
  max_rate_z: 2000.0
  accel_x: 50.0
  accel_y: 50.0
  accel_z: 50.0
  max_travel_x: 300.0
  max_travel_y: 200.0
  max_travel_z: 80.0

instruments:
  filmetrics:
    type: filmetrics
    vendor: kla
    offline: true
    offset_x: 0.0
    offset_y: 0.0
    depth: 0.0
    # Placeholder optical standoff in deck-origin +Z-up coordinates. Re-measure
    # this on the physical Filmetrics setup before trusting hardware scans.
    measurement_height: 80.0
    safe_approach_height: 80.0
    exe_path: ""
    recipe_name: ""
