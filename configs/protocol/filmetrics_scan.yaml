# Filmetrics scan protocol for the CubOS deck-origin frame.
#
# Heights are labware-relative offsets above the plate surface
# (`labware.height_mm`). Filmetrics is a non-contact optical instrument:
# action and approach are at the same height above the plate.

protocol:
  - scan:
      plate: plate_1
      instrument: filmetrics
      method: measure
      # measurement_height is owned by the instrument config (10 mm above
      # the plate surface). Scan only owns inter-well travel here.
      safe_approach_height: 10.0   # same plane as action (non-contact)
