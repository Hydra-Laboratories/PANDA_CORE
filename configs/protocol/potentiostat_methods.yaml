# Sample protocol demonstrating the CubOS potentiostat methods.

protocol:
  - measure:
      instrument: potentiostat
      position: plate_1.A1
      method: measure_ocp
      method_kwargs:
        duration_s: 15.0
        sample_period_s: 0.5

  - measure:
      instrument: potentiostat
      position: plate_1.A1
      method: run_chronoamperometry
      method_kwargs:
        step_potential_v: -0.8
        duration_s: 5.0
        sample_period_s: 0.1

  - measure:
      instrument: potentiostat
      position: plate_1.A1
      method: run_cyclic_voltammetry
      method_kwargs:
        initial_potential_v: 0.0
        vertex_potential_1_v: 0.5
        vertex_potential_2_v: -0.5
        final_potential_v: 0.0
        scan_rate_v_s: 0.1
        step_size_v: 0.01
        cycles: 1
