# Generic scan protocol using legacy scan travel aliases.
# Kept for compatibility checks while new protocols move to
# interwell_travel_height and entry_travel_height.

protocol:
  - move:
      instrument: uvvis
      position: plate_1.A1

  - scan:
      plate: plate_1
      instrument: uvvis
      method: measure
      entry_travel_z: 10.0
      safe_approach_height: 10.0
