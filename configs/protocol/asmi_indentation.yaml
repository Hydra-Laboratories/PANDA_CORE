# ASMI indentation protocol for the CubOS deck-origin frame.
#
# In the CubOS deck-origin frame, +Z is up and -Z is down. Run this only
# after staged jog-direction, homing, WPos calibration, and clearance checks pass.

positions:
  # High park pose near the back-right/home side, intentionally below the
  # physical max Z but high enough to clear the Y rail in the side view.
  park_position: [360.0, 260.0, 85.0]

protocol:
  - home:

  - scan:
      plate: plate
      instrument: asmi
      method: indentation
      # Intended as an absolute first-entry clearance in the deck-origin frame.
      entry_travel_height: 85.0
      # Absolute well-to-well travel plane. The estimated well top is z=27.0,
      # so z=35.0 is 8 mm above the well top.
      interwell_travel_height: 35.0
      # Absolute action/start height and lower indentation limit. Downward
      # indentation decreases Z in the deck-origin frame.
      measurement_height: 32.0
      indentation_limit: 30.0
      method_kwargs:
        step_size: 0.1
        force_limit: 10.0
        baseline_samples: 10
        measure_with_return: false

  - move:
      instrument: asmi
      position: park_position
      travel_z: 85.0

  - home:
