# ASMI indentation protocol for the CubOS deck-origin frame.
#
# In the CubOS deck-origin frame, +Z is up and -Z is down. Run this only
# after staged jog-direction, homing, WPos calibration, and clearance checks pass.

positions:
  # High park pose near the back-right/home side, intentionally below the
  # physical max Z but high enough to clear the Y rail in the side view.
  park_position: [360.0, 260.0, 85.0]

protocol:
  - home:

  - scan:
      plate: plate
      instrument: asmi
      method: indentation
      # Scan owns travel-Z between wells; per-well action Z and the
      # ASMI-specific stopping criterion live in method_kwargs below.
      entry_travel_height: 85.0      # absolute first-entry clearance
      interwell_travel_height: 35.0  # ~8 mm above the estimated well top (z=27)
      method_kwargs:
        # Absolute deck-frame action/start Z. Downward indentation
        # decreases Z; indentation_limit is the deepest reachable Z.
        measurement_height: 32.0
        indentation_limit: 30.0
        step_size: 0.1
        force_limit: 10.0
        baseline_samples: 10
        measure_with_return: false

  - move:
      instrument: asmi
      position: park_position
      travel_z: 85.0

  - home:
