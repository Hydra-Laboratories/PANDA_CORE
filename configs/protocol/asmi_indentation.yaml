# ASMI indentation protocol for the CubOS deck-origin frame.
#
# +Z is up. Heights on `scan` (`measurement_height`, `safe_approach_height`)
# are *labware-relative* offsets above the plate's deck-frame surface Z
# (`labware.height_mm`). Inter-labware travel uses the gantry's `safe_z`.
# Run only after staged jog-direction, homing, WPos calibration, and
# clearance checks pass.

positions:
  # High park pose near the back-right/home side, intentionally below the
  # physical max Z but high enough to clear the Y rail in the side view.
  park_position: [360.0, 260.0, 85.0]

protocol:
  - home:

  - scan:
      plate: plate
      instrument: asmi
      method: indentation
      # Labware-relative offsets above plate.height_mm (mm; negative = below).
      measurement_height: -1.0    # 1 mm into the well surface for seating
      safe_approach_height: 8.0   # 8 mm above the plate surface
      indentation_limit: 5.0      # magnitude (mm of descent below action plane)
      method_kwargs:
        step_size: 0.1
        force_limit: 10.0
        baseline_samples: 10
        measure_with_return: false

  - move:
      instrument: asmi
      position: park_position
      travel_z: 85.0

  - home:
