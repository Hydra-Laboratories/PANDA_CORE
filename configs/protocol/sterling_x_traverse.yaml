# Sterling X-axis traverse for collision avoidance testing.
# Moves the gantry from x_min to x_max at a safe Z clearance plane.

positions:
  park: [280.0, 280.0, 85.0]
  x_min: [0.0, 150.0, 40.0]
  x_max: [306.0, 150.0, 40.0]

protocol:
  - home:

  - move:
      instrument: asmi
      position: park
      travel_z: 85.0

  - move:
      instrument: asmi
      position: x_min
      travel_z: 40.0

  - move:
      instrument: asmi
      position: x_max
      travel_z: 40.0

  - move:
      instrument: asmi
      position: x_min
      travel_z: 40.0

  - move:
      instrument: asmi
      position: park
      travel_z: 85.0

  - home:
